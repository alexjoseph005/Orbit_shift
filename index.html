<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orbit Shift - Mobile Stats Edition</title>
    <style>
        * {
            box-sizing: border-box;
            /* Removes gray highlight tap box on iOS/Android Webkit engines */
            -webkit-tap-highlight-color: transparent;
            /* Blocks modern mobile phone gestures like swipe-to-refresh or double-tap zoom */
            touch-action: none;
        }
        body { 
            margin: 0; 
            background: #050510; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            user-select: none; 
        }
        #game-container { 
            position: relative; 
            border: 4px solid #333; 
            box-shadow: 0 0 30px rgba(0,210,255,0.1); 
            background: #000; 
        }
        canvas { display: block; }
        .ui { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; z-index: 5; font-size: 1.1rem; }
        #message-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(0,0,0,0.95); padding: 25px; border-radius: 15px; border: 2px solid #00d2ff; display: none; z-index: 10; width: 85%; max-width: 290px; box-shadow: 0 0 50px rgba(0,0,0,1); }
        .stats-list { text-align: left; margin: 15px 0; line-height: 1.6; border-top: 1px solid #333; border-bottom: 1px solid #333; padding: 12px 0; }
        .stat-item { display: flex; justify-content: space-between; font-size: 0.9rem; letter-spacing: 1px; }
        .stat-value { color: #00d2ff; font-weight: bold; }
        button { background: #00d2ff; border: none; padding: 12px 30px; font-size: 1.1rem; cursor: pointer; border-radius: 5px; font-weight: bold; transition: background 0.2s; }
        #transition-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; font-size: 2.2rem; font-weight: 900; opacity: 0; transition: opacity 0.3s; z-index: 8; text-shadow: 0 0 20px currentColor; text-align: center; width: 100%; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="ui">
            <div id="score">Level: 1</div>
            <div id="highScoreHUD">Best: 1</div>
        </div>
        <div id="transition-overlay">LEVEL CLEAR</div>
        <canvas id="gameCanvas"></canvas>
        <div id="message-box">
            <h2 style="margin-top:0; color:#ff4444; letter-spacing: 1px;">CRASHED!</h2>
            <div class="stats-list">
                <div class="stat-item">HIGH SCORE <span class="stat-value" id="res-high">0</span></div>
                <div class="stat-item">YOUR SCORE <span class="stat-value" id="res-score">0</span></div>
                <div class="stat-item">NEAR MISSES <span class="stat-value" id="res-miss">0</span></div>
            </div>
            <button id="restart-btn">RESTART</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const msgBox = document.getElementById('message-box');
    const scoreDisplay = document.getElementById('score');
    const highScoreHUD = document.getElementById('highScoreHUD');
    const transOverlay = document.getElementById('transition-overlay');
    const restartBtn = document.getElementById('restart-btn');

    let level = 1;
    let highScore = localStorage.getItem('orbitHighScore') || 1;
    let nearMissCount = 0;
    let isNearMissActive = false; 

    let gameOver = false;
    let inTransition = false;
    let isPressing = false;
    let angle = 0;
    let orbitRadius = 250;
    let obstacles = [];
    let trail = [];
    let stars = [];
    let animationId = null;
    let shakeIntensity = 0;
    let transitionPulse = 0;
    
    let centerX = canvas.width / 2;
    let centerY = canvas.height / 2;
    let scaleFactor = 1; // Tracks mobile sizing ratios relative to baseline 600px 
    const levelHues = [190, 280, 340, 50, 150]; 

    // Handle fluid layout alterations across portrait or landscape mobile displays
    function resizeGame() {
        const targetSize = Math.min(window.innerWidth - 10, window.innerHeight - 10, 600);
        canvas.width = targetSize;
        canvas.height = targetSize;
        centerX = canvas.width / 2;
        centerY = canvas.height / 2;
        scaleFactor = targetSize / 600;
    }
    window.addEventListener('resize', resizeGame);
    resizeGame();

    function initStars() {
        stars = [];
        for (let i = 0; i < 100; i++) {
            stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2, speed: Math.random() * 0.8 + 0.2, opacity: Math.random() });
        }
    }

    function getLevelColor(lvl = level) {
        return `hsl(${levelHues[(lvl - 1) % levelHues.length]}, 80%, 50%)`;
    }

    function initLevel() {
        obstacles = [];
        highScoreHUD.innerText = `Best: ${highScore}`;
        const obstacleCount = 3 + Math.floor(level / 1.5);
        for (let i = 0; i < obstacleCount; i++) {
            obstacles.push({
                dist: (70 + (Math.random() * 160)), // Calculated adaptively later via scaleFactor
                baseDist: 70 + (Math.random() * 160),
                angle: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * (0.03 + level * 0.008),
                size: 10 + (Math.random() * 15)
            });
        }
    }

    function draw() {
        if (gameOver) return;

        ctx.save();
        if (shakeIntensity > 0) {
            ctx.translate((Math.random() - 0.5) * shakeIntensity, (Math.random() - 0.5) * shakeIntensity);
            shakeIntensity *= 0.9;
            if (shakeIntensity < 0.1) shakeIntensity = 0;
        }

        ctx.fillStyle = 'rgba(5, 5, 16, 0.3)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        stars.forEach(s => {
            s.y += inTransition ? s.speed * 5 : s.speed;
            if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
            ctx.fillStyle = "white";
            ctx.globalAlpha = s.opacity;
            ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill();
        });
        ctx.globalAlpha = 1;

        // Adaptive center core sizing 
        ctx.beginPath(); ctx.arc(centerX, centerY, 35 * scaleFactor, 0, Math.PI * 2); 
        ctx.strokeStyle = getLevelColor(); ctx.lineWidth = 2; ctx.stroke();

        if (!inTransition) {
            if (isPressing) orbitRadius -= 3.8;
            else orbitRadius += 2.5;
            if (orbitRadius < 35) triggerLevelTransition();
            if (orbitRadius > 280) orbitRadius = 280;
            angle += 0.035;
        }

        // Apply scaleFactor to position coordinates smoothly
        const currentScaledRadius = orbitRadius * scaleFactor;
        const px = centerX + Math.cos(angle) * currentScaledRadius;
        const py = centerY + Math.sin(angle) * currentScaledRadius;

        trail.push({x: px, y: py});
        if (trail.length > 12) trail.shift();
        trail.forEach((p, i) => {
            ctx.beginPath(); ctx.arc(p.x, p.y, (i / trail.length) * 6 * scaleFactor, 0, Math.PI * 2); 
            ctx.fillStyle = getLevelColor(); ctx.globalAlpha = i / trail.length; ctx.fill();
        });
        ctx.globalAlpha = 1;

        let currentlyInDangerZone = false;

        obstacles.forEach(obs => {
            if (!inTransition) obs.angle += obs.rotSpeed;
            const currentObsDist = obs.baseDist * scaleFactor;
            const ox = centerX + Math.cos(obs.angle) * currentObsDist;
            const oy = centerY + Math.sin(obs.angle) * currentObsDist;
            
            ctx.fillStyle = getLevelColor(); 
            ctx.beginPath(); 
            ctx.arc(ox, oy, obs.size * scaleFactor, 0, Math.PI * 2); 
            ctx.fill();
            
            if (!inTransition) {
                const dist = Math.hypot(px - ox, py - oy);
                const colDist = (8 * scaleFactor) + (obs.size * scaleFactor);
                
                if (dist < colDist) endGame();
                
                // Adaptive Near Miss Logic Scaling
                if (dist < colDist + (15 * scaleFactor)) {
                    shakeIntensity = Math.max(shakeIntensity, 4); 
                    currentlyInDangerZone = true;
                }
            }
        });

        if (currentlyInDangerZone && !isNearMissActive) {
            nearMissCount++;
            isNearMissActive = true;
        } else if (!currentlyInDangerZone) {
            isNearMissActive = false;
        }

        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(px, py, 8 * scaleFactor, 0, Math.PI * 2); ctx.fill();

        if (inTransition) {
            transitionPulse += 15 * scaleFactor;
            ctx.beginPath(); ctx.arc(centerX, centerY, transitionPulse, 0, Math.PI * 2);
            ctx.strokeStyle = getLevelColor(); ctx.lineWidth = 5 * scaleFactor; ctx.globalAlpha = Math.max(0, 1 - (transitionPulse / (canvas.width)));
            ctx.stroke(); ctx.globalAlpha = 1;
        }

        ctx.restore();
        if (!gameOver) animationId = requestAnimationFrame(draw);
    }

    function triggerLevelTransition() {
        inTransition = true;
        transitionPulse = 0;
        transOverlay.style.opacity = "1";
        transOverlay.style.color = getLevelColor();
        setTimeout(() => {
            level++;
            if (level > highScore) { 
                highScore = level; 
                localStorage.setItem('orbitHighScore', highScore); 
            }
            scoreDisplay.innerText = `Level: ${level}`;
            orbitRadius = 250; trail = []; initLevel();
            setTimeout(() => { inTransition = false; transOverlay.style.opacity = "0"; }, 400);
        }, 800);
    }

    function endGame() { 
        gameOver = true; 
        if (animationId) cancelAnimationFrame(animationId); 
        
        document.getElementById('res-high').innerText = highScore;
        document.getElementById('res-score').innerText = level;
        document.getElementById('res-miss').innerText = nearMissCount;
        
        msgBox.style.display = 'block'; 
        isPressing = false;
    }

    function resetGame() { 
        if (animationId) cancelAnimationFrame(animationId);
        level = 1; 
        nearMissCount = 0;
        isNearMissActive = false;
        scoreDisplay.innerText = `Level: 1`; 
        orbitRadius = 250; 
        gameOver = false; 
        inTransition = false;
        trail = []; 
        msgBox.style.display = 'none'; 
        initStars(); 
        initLevel(); 
        draw(); 
    }

    // --- INPUT EVENT INTERCEPTORS ---

    // Desktop Input Listeners
    window.addEventListener('keydown', (e) => { 
        if (e.code === 'Space') { e.preventDefault(); if (!gameOver) isPressing = true; }
    });
    window.addEventListener('keyup', (e) => { if (e.code === 'Space') isPressing = false; });
    window.addEventListener('mousedown', (e) => { if(!gameOver && e.target !== restartBtn) isPressing = true; });
    window.addEventListener('mouseup', () => isPressing = false);

    // Mobile Phone Touch Input Listeners (Instant Response, Zero Delay)
    window.addEventListener('touchstart', (e) => { 
        if (gameOver) return;
        if (e.target !== restartBtn) {
            e.preventDefault(); // Prevents double-emulating mouse click events
            isPressing = true; 
        }
    }, { passive: false });

    window.addEventListener('touchend', (e) => { 
        if (e.target !== restartBtn) {
            isPressing = false; 
        }
    });

    restartBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        resetGame();
    });
    restartBtn.addEventListener('touchstart', (e) => {
        e.stopPropagation();
        resetGame();
    });

    initStars(); initLevel(); draw();
</script>
</body>
</html>
