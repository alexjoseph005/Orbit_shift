<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Shift - Stats Edition</title>
    <style>
        body { margin: 0; background: #050510; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; user-select: none; }
        #game-container { position: relative; border: 4px solid #333; box-shadow: 0 0 30px rgba(0,210,255,0.1); background: #000; }
        canvas { display: block; }
        .ui { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; z-index: 5; }
        #message-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(0,0,0,0.95); padding: 30px; border-radius: 15px; border: 2px solid #00d2ff; display: none; z-index: 10; width: 280px; box-shadow: 0 0 50px rgba(0,0,0,1); }
        .stats-list { text-align: left; margin: 20px 0; line-height: 1.6; border-top: 1px solid #333; border-bottom: 1px solid #333; padding: 15px 0; }
        .stat-item { display: flex; justify-content: space-between; font-size: 0.9rem; letter-spacing: 1px; }
        .stat-value { color: #00d2ff; font-weight: bold; }
        button { background: #00d2ff; border: none; padding: 12px 30px; font-size: 1.1rem; cursor: pointer; border-radius: 5px; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #00a8cc; }
        #transition-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; font-size: 3rem; font-weight: 900; opacity: 0; transition: opacity 0.3s; z-index: 8; text-shadow: 0 0 20px currentColor; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="ui">
            <div id="score">Level: 1</div>
            <div id="highScoreHUD">Best: 1</div>
        </div>
        <div id="transition-overlay">LEVEL CLEAR</div>
        <canvas id="gameCanvas"></canvas>
        <div id="message-box">
            <h2 style="margin-top:0; color:#ff4444;">CRASHED!</h2>
            <div class="stats-list">
                <div class="stat-item">HIGH SCORE <span class="stat-value" id="res-high">0</span></div>
                <div class="stat-item">YOUR SCORE <span class="stat-value" id="res-score">0</span></div>
                <div class="stat-item">NEAR MISSES <span class="stat-value" id="res-miss">0</span></div>
            </div>
            <button onclick="resetGame()">RESTART</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const msgBox = document.getElementById('message-box');
    const scoreDisplay = document.getElementById('score');
    const highScoreHUD = document.getElementById('highScoreHUD');
    const transOverlay = document.getElementById('transition-overlay');

    canvas.width = 600;
    canvas.height = 600;

    let level = 1;
    let highScore = localStorage.getItem('orbitHighScore') || 1;
    let nearMissCount = 0;
    let isNearMissActive = false; // Prevents counting the same miss multiple times per pass

    let gameOver = false;
    let inTransition = false;
    let isPressing = false;
    let angle = 0;
    let orbitRadius = 250;
    let obstacles = [];
    let trail = [];
    let stars = [];
    let animationId = null;
    let shakeIntensity = 0;
    let transitionPulse = 0;
    
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const levelHues = [190, 280, 340, 50, 150]; 

    function initStars() {
        stars = [];
        for (let i = 0; i < 150; i++) {
            stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2, speed: Math.random() * 0.8 + 0.2, opacity: Math.random() });
        }
    }

    function getLevelColor(lvl = level) {
        return `hsl(${levelHues[(lvl - 1) % levelHues.length]}, 80%, 50%)`;
    }

    function initLevel() {
        obstacles = [];
        highScoreHUD.innerText = `Best: ${highScore}`;
        const obstacleCount = 3 + Math.floor(level / 1.5);
        for (let i = 0; i < obstacleCount; i++) {
            obstacles.push({
                dist: 70 + (Math.random() * 160),
                angle: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * (0.03 + level * 0.008),
                size: 10 + (Math.random() * 15),
                color: getLevelColor()
            });
        }
    }

    function draw() {
        if (gameOver) return;

        ctx.save();
        if (shakeIntensity > 0) {
            ctx.translate((Math.random() - 0.5) * shakeIntensity, (Math.random() - 0.5) * shakeIntensity);
            shakeIntensity *= 0.9;
            if (shakeIntensity < 0.1) shakeIntensity = 0;
        }

        ctx.fillStyle = 'rgba(5, 5, 16, 0.3)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        stars.forEach(s => {
            s.y += inTransition ? s.speed * 5 : s.speed;
            if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
            ctx.fillStyle = "white";
            ctx.globalAlpha = s.opacity;
            ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill();
        });
        ctx.globalAlpha = 1;

        ctx.beginPath(); ctx.arc(centerX, centerY, 35, 0, Math.PI * 2); 
        ctx.strokeStyle = getLevelColor(); ctx.lineWidth = 2; ctx.stroke();

        if (!inTransition) {
            if (isPressing) orbitRadius -= 3.8;
            else orbitRadius += 2.5;
            if (orbitRadius < 35) triggerLevelTransition();
            if (orbitRadius > 280) orbitRadius = 280;
            angle += 0.035;
        }

        const px = centerX + Math.cos(angle) * orbitRadius;
        const py = centerY + Math.sin(angle) * orbitRadius;

        trail.push({x: px, y: py});
        if (trail.length > 15) trail.shift();
        trail.forEach((p, i) => {
            ctx.beginPath(); ctx.arc(p.x, p.y, (i / trail.length) * 6, 0, Math.PI * 2); 
            ctx.fillStyle = getLevelColor(); ctx.globalAlpha = i / trail.length; ctx.fill();
        });
        ctx.globalAlpha = 1;

        let currentlyInDangerZone = false;

        obstacles.forEach(obs => {
            if (!inTransition) obs.angle += obs.rotSpeed;
            const ox = centerX + Math.cos(obs.angle) * obs.dist;
            const oy = centerY + Math.sin(obs.angle) * obs.dist;
            ctx.fillStyle = obs.color; ctx.beginPath(); ctx.arc(ox, oy, obs.size, 0, Math.PI * 2); ctx.fill();
            
            if (!inTransition) {
                const dist = Math.hypot(px - ox, py - oy);
                const colDist = 8 + obs.size;
                
                if (dist < colDist) endGame();
                
                // Near Miss Logic
                if (dist < colDist + 15) {
                    shakeIntensity = Math.max(shakeIntensity, 5); 
                    currentlyInDangerZone = true;
                }
            }
        });

        // Near Miss Counter increment logic
        if (currentlyInDangerZone && !isNearMissActive) {
            nearMissCount++;
            isNearMissActive = true;
        } else if (!currentlyInDangerZone) {
            isNearMissActive = false;
        }

        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(px, py, 8, 0, Math.PI * 2); ctx.fill();

        if (inTransition) {
            transitionPulse += 15;
            ctx.beginPath(); ctx.arc(centerX, centerY, transitionPulse, 0, Math.PI * 2);
            ctx.strokeStyle = getLevelColor(); ctx.lineWidth = 5; ctx.globalAlpha = Math.max(0, 1 - (transitionPulse / 600));
            ctx.stroke(); ctx.globalAlpha = 1;
        }

        ctx.restore();
        if (!gameOver) animationId = requestAnimationFrame(draw);
    }

    function triggerLevelTransition() {
        inTransition = true;
        transitionPulse = 0;
        transOverlay.style.opacity = "1";
        transOverlay.style.color = getLevelColor();
        setTimeout(() => {
            level++;
            if (level > highScore) { 
                highScore = level; 
                localStorage.setItem('orbitHighScore', highScore); 
            }
            scoreDisplay.innerText = `Level: ${level}`;
            orbitRadius = 250; trail = []; initLevel();
            setTimeout(() => { inTransition = false; transOverlay.style.opacity = "0"; }, 400);
        }, 800);
    }

    function endGame() { 
        gameOver = true; 
        if (animationId) cancelAnimationFrame(animationId); 
        
        // Populate Summary
        document.getElementById('res-high').innerText = highScore;
        document.getElementById('res-score').innerText = level;
        document.getElementById('res-miss').innerText = nearMissCount;
        
        msgBox.style.display = 'block'; 
        isPressing = false;
    }

    function resetGame() { 
        if (animationId) cancelAnimationFrame(animationId);
        level = 1; 
        nearMissCount = 0;
        isNearMissActive = false;
        scoreDisplay.innerText = `Level: 1`; 
        orbitRadius = 250; 
        gameOver = false; 
        inTransition = false;
        trail = []; 
        msgBox.style.display = 'none'; 
        initStars(); 
        initLevel(); 
        draw(); 
    }

    window.addEventListener('keydown', (e) => { 
        if (e.code === 'Space') {
            e.preventDefault();
            if (!gameOver) isPressing = true;
        }
    });

    window.addEventListener('keyup', (e) => { 
        if (e.code === 'Space') isPressing = false; 
    });

    window.addEventListener('mousedown', () => { if(!gameOver) isPressing = true; });
    window.addEventListener('mouseup', () => isPressing = false);

    initStars(); initLevel(); draw();
</script>
</body>
</html>
