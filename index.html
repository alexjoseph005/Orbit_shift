<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orbit Shift - Mobile Friendly</title>
    <style>
        * {
            box-sizing: border-box;
            /* Prevents the grey highlight box on mobile webkit browsers when tapped */
            -webkit-tap-highlight-color: transparent;
            /* Disables double-tap to zoom or swipe actions on the game surface */
            touch-action: none;
        }
        body { 
            margin: 0; 
            background: #050505; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            width: 100vw;
        }
        canvas { 
            background: #050505;
            display: block;
        }
        #ui { 
            position: absolute; 
            top: 5%; 
            text-align: center; 
            pointer-events: none; 
            width: 100%; 
            user-select: none;
        }
        h1 { margin: 0 0 5px 0; font-size: 2rem; }
        p { margin: 5px 0; font-size: 1rem; }
        .hint { font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

    <div id="ui">
        <h1 id="score">SCORE: 0</h1>
        <p id="msg">TAP SCREEN or SPACE to Switch Orbit</p>
        <p class="hint">Avoid Red. Collect White.</p>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const msgEl = document.getElementById('msg');

// Game State
let score = 0;
let gameActive = false;
let particles = [];
let obstacles = [];
let collectibles = [];
let frame = 0;
let scaleFactor = 1; // Used to adjust game sizing across different screen resolutions

// Player Object
const player = {
    angle: 0,
    radius: 80,
    size: 8,
    speed: 0.035, 
    dir: 1,      
    color: '#00f2ff'
};

// Dynamic Mobile Resize Logic
function resize() {
    // Make it a perfect square that fits comfortably on portrait or landscape mobile screens
    const size = Math.min(window.innerWidth, window.innerHeight);
    canvas.width = size;
    canvas.height = size;
    
    // Scale game elements proportionally based on a base 600px design
    scaleFactor = size / 600;
}
window.addEventListener('resize', resize);
resize();

// Core Input Handler
function handleInput(e) {
    // Stop mobile browser default actions (like refreshing or zooming)
    if (e) {
        e.preventDefault();
    }
    
    if (!gameActive) {
        resetGame();
        return;
    }
    
    // The Core Mechanic: Reverse direction and expand orbit slightly
    player.dir *= -1;
    player.radius += (6 * scaleFactor); 
    
    // Particle Burst on Input Location
    const px = canvas.width / 2 + Math.cos(player.angle) * player.radius;
    const py = canvas.height / 2 + Math.sin(player.angle) * player.radius;
    createParticles(px, py, '#fff', 5);
}

// Keyboard (Desktop)
window.addEventListener('keydown', (e) => { 
    if(e.code === 'Space') {
        e.preventDefault();
        handleInput(); 
    }
});

// Mouse (Desktop)
canvas.addEventListener('mousedown', (e) => {
    handleInput(e);
});

// Touch (Mobile) - "touchstart" responds instantly without the 300ms click delay
canvas.addEventListener('touchstart', (e) => {
    handleInput(e);
}, { passive: false });


function resetGame() {
    score = 0;
    player.radius = 100 * scaleFactor;
    player.angle = 0;
    obstacles = [];
    collectibles = [];
    gameActive = true;
    msgEl.innerText = "";
    scoreEl.innerText = "SCORE: 0";
}

function createParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y, 
            vx: (Math.random() - 0.5) * 5 * scaleFactor, 
            vy: (Math.random() - 0.5) * 5 * scaleFactor, 
            life: 1, 
            color
        });
    }
}

function spawnEntities() {
    // Scaled dynamic radius paths for spawning
    if (frame % 80 === 0) {
        const ang = Math.random() * Math.PI * 2;
        const rad = (50 + Math.random() * 200) * scaleFactor;
        obstacles.push({ angle: ang, radius: rad, size: (10 + Math.random() * 12) * scaleFactor });
    }
    if (frame % 120 === 0) {
        const ang = Math.random() * Math.PI * 2;
        const rad = (70 + Math.random() * 160) * scaleFactor;
        collectibles.push({ angle: ang, radius: rad, size: 6 * scaleFactor });
    }
}

function update() {
    if (!gameActive) return;

    frame++;
    
    // Physics & Movement
    player.angle += player.speed * player.dir;
    player.radius -= (0.25 * scaleFactor); // Gravity pull scale

    // Player current position
    const px = canvas.width / 2 + Math.cos(player.angle) * player.radius;
    const py = canvas.height / 2 + Math.sin(player.angle) * player.radius;

    // Game Over Boundaries (Too close to sun or too far out of screen)
    if (player.radius < 25 * scaleFactor || player.radius > (canvas.width / 2) - (15 * scaleFactor)) {
        endGame();
    }

    // Check Item Collections
    collectibles = collectibles.filter(c => {
        const cx = canvas.width / 2 + Math.cos(c.angle) * c.radius;
        const cy = canvas.height / 2 + Math.sin(c.angle) * c.radius;
        const dist = Math.hypot(px - cx, py - cy);
        if (dist < (player.size * scaleFactor) + c.size) {
            score += 10;
            scoreEl.innerText = `SCORE: ${score}`;
            player.radius += (18 * scaleFactor); // Push out orbit reward
            createParticles(cx, cy, '#fff', 10);
            return false;
        }
        return true;
    });

    // Check Obstacle Collisions
    obstacles.forEach(o => {
        const ox = canvas.width / 2 + Math.cos(o.angle) * o.radius;
        const oy = canvas.height / 2 + Math.sin(o.angle) * o.radius;
        const dist = Math.hypot(px - ox, py - oy);
        if (dist < (player.size * scaleFactor) + o.size) endGame();
    });

    spawnEntities();
}

function endGame() {
    gameActive = false;
    msgEl.innerHTML = `GAME OVER<br><span style="font-size:0.6em;color:#00f2ff;">Tap to Try Again</span>`;
    createParticles(canvas.width/2, canvas.height/2, '#ff3300', 25);
}

function draw() {
    ctx.fillStyle = 'rgba(5, 5, 5, 0.25)'; // Motion trail effect
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;

    // Draw Center Danger Sun
    ctx.beginPath();
    ctx.arc(centerX, centerY, 22 * scaleFactor, 0, Math.PI * 2);
    ctx.fillStyle = '#ff3300';
    ctx.fill();
    ctx.shadowBlur = 20 * scaleFactor;
    ctx.shadowColor = '#ff3300';

    if (gameActive) {
        // Draw Player
        const px = centerX + Math.cos(player.angle) * player.radius;
        const py = centerY + Math.sin(player.angle) * player.radius;
        ctx.beginPath();
        ctx.arc(px, py, player.size * scaleFactor, 0, Math.PI * 2);
        ctx.fillStyle = player.color;
        ctx.shadowColor = player.color;
        ctx.fill();

        // Draw Collectibles
        collectibles.forEach(c => {
            ctx.beginPath();
            const cx = centerX + Math.cos(c.angle) * c.radius;
            const cy = centerY + Math.sin(c.angle) * c.radius;
            ctx.arc(cx, cy, c.size, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
        });

        // Draw Obstacles
        obstacles.forEach(o => {
            ctx.beginPath();
            const ox = centerX + Math.cos(o.angle) * o.radius;
            const oy = centerY + Math.sin(o.angle) * o.radius;
            ctx.arc(ox, oy, o.size, 0, Math.PI * 2);
            ctx.fillStyle = '#ff4444';
            ctx.fill();
        });
    }

    // Render Particles
    particles.forEach((p, i) => {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.025;
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 3 * scaleFactor, 3 * scaleFactor);
        if (p.life <= 0) particles.splice(i, 1);
    });
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;

    update();
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
